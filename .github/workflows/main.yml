name: EngTv CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'

jobs:

  # ─────────────────────────────────────────────
  # 1. Quality & Tests
  # ─────────────────────────────────────────────
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level=high || echo "Review vulnerabilities"

      - name: Typecheck libs
        run: pnpm run typecheck:libs

      - name: Backend typecheck
        run: pnpm --filter @workspace/api-server typecheck

      - name: Backend tests
        run: pnpm --filter @workspace/api-server test

      - name: Frontend typecheck
        run: pnpm --filter @workspace/engtv typecheck

      - name: Frontend tests
        run: pnpm --filter @workspace/engtv test

      - name: Frontend build
        run: pnpm --filter @workspace/engtv build


  # ─────────────────────────────────────────────
  # 2. Backend Build
  # ─────────────────────────────────────────────
  build-backend:

    runs-on: ubuntu-latest
    needs: quality

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --filter @workspace/api-server build

      - name: Upload backend
        uses: actions/upload-artifact@v4
        with:
          name: api-server-build
          path: artifacts/api-server/dist/
          retention-days: 7



  # ─────────────────────────────────────────────
  # 3. Android Build
  # ─────────────────────────────────────────────
  build-android:

    runs-on: ubuntu-latest
    needs: quality

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin


      - name: Setup Android SDK
        uses: android-actions/setup-android@v3


      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle.kts','android/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-


      - name: Create local.properties
        working-directory: android
        run: |
          echo "API_BASE_URL=https://zip-eng-tv--omaralazawy12.replit.app/api/" > local.properties


      - name: Make gradlew executable
        run: chmod +x android/gradlew


      - name: Android lint
        working-directory: android
        run: ./gradlew lint --stacktrace


      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EngTv-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30



  # ─────────────────────────────────────────────
  # 4. Release Build (Tags Only)
  # ─────────────────────────────────────────────
  release:

    if: startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest

    needs:
      - build-backend
      - build-android


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Download backend build
        uses: actions/download-artifact@v4
        with:
          name: api-server-build
          path: dist/


      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: EngTv-debug-apk
          path: apk/


      - name: Generate checksum
        run: |
          sha256sum apk/*.apk > apk/checksums.txt


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2

        with:

          name: EngTv ${{ github.ref_name }}

          files: |
            apk/*.apk
            dist/*

          draft: false

          prerelease: true
