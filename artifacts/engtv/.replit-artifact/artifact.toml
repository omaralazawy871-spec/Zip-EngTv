kind = "web"
previewPath = "/"
title = "EngTv"
version = "1.0.0"
id = "artifacts/engtv"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21959

[services.development]
run = "pnpm --filter @workspace/engtv run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/engtv", "run", "build" ]
serve = "static"
publicDir = "artifacts/engtv/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21959"
BASE_PATH = "/"
